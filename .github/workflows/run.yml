name: HTB Speedrun Automator

on:
  workflow_dispatch: # Qo'lda ishga tushirish uchun

jobs:
  run-exploit:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish (Checkout)
        uses: actions/checkout@v4

      - name: Pythonni sozlash
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kerakli kutubxonalarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install pwntools

      - name: Skriptni ishga tushirish
        # exploit.py fayli loyihangizning asosiy papkasida bo'lishi shart
        run: python exploit.py
