name: HTB Speedrun Automator

on:
  # workflow_dispatch tugmasi orqali qo'lda ishga tushirish imkonini beradi
  workflow_dispatch:

jobs:
  run-exploit:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni yuklab olish (Checkout)
        uses: actions/checkout@v4

      - name: Pythonni sozlash
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Kerakli kutubxonalarni o'rnatish
        run: |
          python -m pip install --upgrade pip
          pip install pwntools

      - name: Skriptni ishga tushirish
        # exploit.py fayli sizning asosiy kodingiz bo'lishi kerak
        run: python exploit.py
